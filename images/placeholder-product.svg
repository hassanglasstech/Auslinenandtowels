<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Product image upon request">
  <defs>
    <pattern id="weave" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#f2ede2"/>
      <path d="M0 3h6M3 0v6" stroke="#e5e0d2" stroke-width="0.6"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#weave)"/>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#b8933a" stroke-opacity="0.35" stroke-width="1"/>
  <g transform="translate(200 175)" text-anchor="middle" font-family="'Inter', sans-serif">
    <text y="-12" font-size="20" font-weight="500" fill="#1a1f4e" letter-spacing="0.5">Australian <tspan fill="#b8933a">Linen</tspan></text>
    <text y="14" font-size="20" font-weight="500" fill="#1a1f4e" letter-spacing="0.5">&amp; <tspan fill="#b8933a">Towels</tspan></text>
  </g>
  <g transform="translate(200 245)" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#b8933a" stroke-width="0.8"/>
    <text y="22" font-size="10" fill="#6b6e7d" letter-spacing="3" text-transform="uppercase">PHOTO UPON REQUEST</text>
    <text y="40" font-size="9" fill="#9ca0af" letter-spacing="2">Contact us for product imagery</text>
  </g>
</svg>

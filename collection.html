<style>
  :root{
    /* Brand tokens inherit from assets/styles.css; only page-local overrides here */
    --navy2:#252a5c;
    --gold2:#c9a84c;
    --cream:#faf8f3;
    --border:#e5e0d2;
    --sidebar:280px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--f-sans),sans-serif;background:var(--cream);color:var(--navy);min-height:100vh}
  a{text-decoration:none;color:inherit}

  /* ── LAYOUT ── */
  .collection-wrap{
    max-width:1400px;margin:0 auto;padding:32px 24px 80px;
    display:grid;grid-template-columns:var(--sidebar) 1fr;gap:40px;
    align-items:start;
  }
  @media(max-width:900px){
    .collection-wrap{grid-template-columns:1fr;gap:0;padding:16px 16px 60px}
  }

  /* ── PAGE TITLE ── */
  .page-hero{
    background:var(--navy);color:#fff;
    padding:48px 24px 36px;text-align:center;
  }
  .page-hero .label{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;display:block;
  }
  .page-hero h1{
    font-family:var(--f-serif);font-size:clamp(28px,5vw,48px);
    font-weight:400;line-height:1.1;
  }
  .page-hero h1 em{font-style:italic;color:var(--gold)}

  /* ── SIDEBAR ── */
  .sidebar{
    position:sticky;top:78px;          /* offset below sticky header */
    background:#fff;border:1px solid var(--border);
    border-radius:4px;overflow:hidden;
    max-height:calc(100vh - 90px);overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:#e5e0d2 transparent;
  }
  .sidebar::-webkit-scrollbar{width:4px;}
  .sidebar::-webkit-scrollbar-track{background:transparent;}
  .sidebar::-webkit-scrollbar-thumb{background:#d6d0c0;border-radius:4px;}
  .sidebar-header{
    background:var(--navy);color:#fff;
    padding:16px 20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  }
  .cat-group{border-bottom:1px solid var(--border)}
  .cat-group:last-child{border-bottom:none}

  /* parent category */
  .cat-parent{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;cursor:pointer;
    font-size:13px;font-weight:500;letter-spacing:.04em;
    background:#fff;border:none;width:100%;text-align:left;
    transition:background .15s;
  }
  .cat-parent:hover{background:#f5f4f0}
  .cat-parent.active{color:var(--gold2);font-weight:600}
  .cat-parent .chevron{
    width:14px;height:14px;transition:transform .25s;flex-shrink:0;
    color:var(--muted);
  }
  .cat-parent.open .chevron{transform:rotate(180deg)}

  /* subcategories */
  .sub-list{
    display:none;padding:4px 0 10px 0;background:#faf9f6;
  }
  .sub-list.open{display:block}
  .sub-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 20px 9px 32px;cursor:pointer;
    font-size:12.5px;color:var(--muted);transition:color .15s,background .15s;
    border:none;background:none;width:100%;text-align:left;
  }
  .sub-item:hover{color:var(--navy);background:#f0ede6}
  .sub-item.active{color:var(--navy);font-weight:500}
  .sub-item .count{
    background:var(--navy);color:#fff;
    font-size:10px;padding:2px 7px;border-radius:20px;min-width:22px;text-align:center;
  }
  .sub-item.coming .count{
    background:#ccc;color:#666;
  }
  .sub-item .cs-badge{
    font-size:9px;color:#aaa;letter-spacing:.06em;text-transform:uppercase;
  }

  /* mobile sidebar toggle */
  .sidebar-toggle{
    display:none;width:100%;padding:14px 20px;
    background:var(--navy);color:#fff;border:none;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;text-align:left;
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:0;
  }
  @media(max-width:900px){
    .sidebar{position:static;border-radius:0;margin-bottom:24px}
    .sidebar-toggle{display:flex}
    .sidebar-content{display:none}
    .sidebar-content.open{display:block}
  }
  @media(min-width:901px){
    .sidebar-toggle{display:none}
    .sidebar-content{display:block}
  }

  /* ── MAIN CONTENT ── */
  .main-content{}

  /* ── SEARCH + FILTER COMBO ── */
  .search-panel{
    background:#fff;
    border:1px solid var(--border);
    border-radius:3px;
    margin-bottom:16px;
    transition:box-shadow .15s;
  }
  .search-panel:focus-within{
    border-color:var(--gold2);
    box-shadow:0 0 0 3px rgba(184,137,58,.12);
  }
  /* input row */
  .search-input-row{
    position:relative;display:flex;align-items:center;
  }
  .search-input-row svg{
    position:absolute;left:14px;
    width:16px;height:16px;color:#9a9280;pointer-events:none;flex-shrink:0;
  }
  #collectionSearch{
    width:100%;padding:12px 44px 12px 42px;
    border:none;border-radius:3px;
    background:transparent;color:var(--navy);
    font-family:var(--f-sans),sans-serif;font-size:13.5px;
    outline:none;
  }
  #collectionSearch::placeholder{color:#b0a898}
  .search-clear{
    position:absolute;right:10px;
    background:none;border:none;cursor:pointer;padding:4px;
    color:#9a9280;display:none;line-height:1;font-size:18px;
  }
  .search-clear.visible{display:block}
  .search-clear:hover{color:var(--navy)}

  /* filter rows — appear below input, separated by a hairline */
  .quick-filters{
    display:none;
    border-top:1px solid var(--border);
    padding:10px 14px 8px;
  }
  .qf-row{
    display:flex;align-items:center;gap:8px;
    padding:4px 0;
  }
  .qf-row + .qf-row{border-top:1px solid #f0ece4}
  .qf-label{
    font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);white-space:nowrap;
    min-width:56px;flex-shrink:0;
  }
  .qf-pills{
    display:flex;gap:5px;flex-wrap:wrap;align-items:center;
  }
  .qf-pill{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 9px;border-radius:20px;cursor:pointer;
    font-size:11px;font-family:var(--f-sans),sans-serif;
    border:1px solid var(--border);background:#faf9f6;color:var(--navy);
    transition:all .12s;white-space:nowrap;line-height:1.3;
  }
  .qf-pill:hover{border-color:var(--gold2);background:#fdf8ef}
  .qf-pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .qf-pill.active:hover{background:#253e7a}
  .qf-dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
    border:1px solid rgba(0,0,0,.15);
  }
  .qf-dot.stripe{background:linear-gradient(135deg,#fff 50%,#3b82f6 50%)}
  .qf-dot.stripe-bk{background:linear-gradient(135deg,#fff 50%,#1a1a1a 50%)}
  .qf-clear-all{
    font-size:11px;color:var(--gold2);border:none;background:none;
    cursor:pointer;padding:0;text-decoration:underline;white-space:nowrap;
    margin-left:6px;flex-shrink:0;
  }
  .qf-clear-all:hover{color:var(--navy)}

  /* active filter breadcrumb */
  .filter-bar{
    display:flex;align-items:center;gap:10px;margin-bottom:24px;
    flex-wrap:wrap;
  }
  .filter-bar .showing{font-size:13px;color:var(--muted)}
  .filter-bar .active-filter{
    display:flex;align-items:center;gap:6px;
    background:var(--navy);color:#fff;
    padding:5px 12px;border-radius:20px;font-size:12px;
  }
  .filter-bar .clear{
    background:none;border:none;color:#fff;cursor:pointer;font-size:14px;line-height:1;
    padding:0 0 0 4px;
  }
  /* Sort dropdown */
  .sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .sort-wrap label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);white-space:nowrap;}
  #sortSelect{border:1px solid var(--border);background:#fff;color:var(--navy);
    font-family:"JetBrains Mono",monospace;font-size:10.5px;padding:7px 10px;
    border-radius:2px;cursor:pointer;outline:none;letter-spacing:.04em;}
  #sortSelect:focus{border-color:var(--gold2);}
  /* Skeleton loader */
  .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
  .sk-card{background:#fff;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .sk-img{aspect-ratio:1;background:linear-gradient(90deg,#f0ede8 25%,#e8e4de 50%,#f0ede8 75%);
    background-size:200% 100%;animation:sk-shine 1.5s infinite;}
  .sk-line{height:10px;border-radius:4px;margin:0 14px 8px;
    background:linear-gradient(90deg,#f0ede8 25%,#e8e4de 50%,#f0ede8 75%);
    background-size:200% 100%;animation:sk-shine 1.5s infinite;}
  .sk-line.wide{height:14px;margin-top:14px;}
  .sk-line.short{width:55%;}
  @keyframes sk-shine{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* COMING SOON panel */
  .coming-soon-panel{
    display:none;
    background:#fff;border:1px solid var(--border);border-radius:4px;
    padding:80px 40px;text-align:center;
  }
  .coming-soon-panel.visible{display:block}
  .cs-icon{font-size:48px;margin-bottom:16px}
  .cs-title{
    font-family:var(--f-serif);font-size:32px;font-weight:400;
    margin-bottom:8px;
  }
  .cs-title em{font-style:italic;color:var(--gold)}
  .cs-sub{color:var(--muted);font-size:14px;line-height:1.6;max-width:340px;margin:0 auto 28px}
  .cs-cta{
    display:inline-block;background:var(--navy);color:#fff;
    padding:13px 32px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
    border-radius:2px;transition:background .2s;
  }
  .cs-cta:hover{background:var(--gold2)}

  /* PRODUCT GRID */
  .product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
  }
  @media(max-width:600px){
    .product-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  }

  .product-card{
    background:#fff;border:1px solid var(--border);border-radius:3px;
    overflow:hidden;cursor:pointer;position:relative;
    transition:box-shadow .2s,transform .2s;
  }
  .product-card:hover{box-shadow:0 8px 32px rgba(15,21,53,.1);transform:translateY(-2px)}
  /* Overlay link — makes entire card right-clickable / middle-clickable / Ctrl+click */
  .pc-link{position:absolute;inset:0;z-index:1;display:block;}
  .product-card .product-cta{position:relative;z-index:2;}

  .product-img{
    aspect-ratio:1;overflow:hidden;background:#f0ede8;position:relative;
  }
  .product-img img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .4s;
  }
  .product-card:hover .product-img img{transform:scale(1.04)}

  .product-info{padding:14px 16px 18px}
  .product-sub{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);margin-bottom:4px}
  .product-name{font-family:var(--f-serif);font-size:17px;font-weight:600;line-height:1.25;margin-bottom:6px}
  .product-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
  .product-sizes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
  .sz{
    font-size:10px;padding:3px 8px;border:1px solid var(--border);
    border-radius:2px;color:var(--muted);
  }
  .product-cta{
    display:block;width:100%;padding:10px;text-align:center;
    background:var(--navy);color:#fff;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    border:none;cursor:pointer;border-radius:2px;transition:background .2s;
    font-family:'DM Sans',sans-serif;
  }
  .product-cta:hover{background:var(--gold2)}

  /* "Photo on request" badge for products without dedicated imagery */
  .product-img-placeholder img{ opacity:.92; }
  .photo-pending{
    position:absolute; bottom:10px; right:10px;
    background:rgba(26,31,78,.85); color:#fff;
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:9px; letter-spacing:.12em; text-transform:uppercase;
    padding:4px 8px; border-radius:2px; z-index:2; pointer-events:none;
  }
  .product-tag{
    position:absolute; top:10px; right:10px;
    background:var(--accent-red); color:#fff;
    font-family:'JetBrains Mono', ui-monospace, monospace;
    font-size:9px; letter-spacing:.15em; text-transform:uppercase;
    padding:4px 9px; border-radius:2px; z-index:2;
  }

  /* toast */
  .toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--navy);color:#fff;padding:12px 24px;border-radius:4px;
    font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Swatch dot colours */
  .dot.white { background: #ffffff; border-color: #d6d1c4; }
  .dot.charcoal { background: #3a3a45; }
  .dot.camel { background: #c9b086; }
  .dot.black { background: #000000; }
  .dot.navy { background: #1C2B7E; }
  .dot.aqua { background: #57cc99; }
  .dot.cherry { background: #ba0404; }
  .dot.coffee { background: #582f0e; }
  .dot.fuchsia { background: #f72585; }
  .dot.garnet { background: #6f1d1b; }
  .dot.lime { background: #9ef01a; }
  .dot.mirage { background: #83c5be; }
  .dot.pink { background: #ffb5a7; }
  .dot.purple { background: #7209b7; }
  .dot.royal { background: #1B2A7A; }
</style>
</head>

<div class="page-hero">

<script>
// ══════════════════════════════════════════════
// DATA — sourced from assets/products-data.js (single source of truth)
// ══════════════════════════════════════════════
const PRODUCTS = (function() {
  const rawProducts = window.ALT_PRODUCTS || [];
  const renderedParentSkus = new Set();
  const list = [];

  rawProducts.forEach(p => {
    if (p.parentSku) {
      if (renderedParentSkus.has(p.parentSku)) return;
      renderedParentSkus.add(p.parentSku);

      const siblings = rawProducts.filter(s => s.parentSku === p.parentSku);
      let primaryProduct = siblings[0];

      // Read from ALT_PARENTS centralized dictionary
      const parentInfo = window.ALT_PARENTS && window.ALT_PARENTS[p.parentSku];
      const name = parentInfo ? parentInfo.name : (p.name + " Range");
      const desc = parentInfo ? parentInfo.desc : p.description;
      const tag = parentInfo ? parentInfo.tag : (p.tag || "");

      // Available Colours
      const uniqueColours = [];
      const seenColours = new Set();
      siblings.forEach(s => {
        const c = s.colour.split('/')[0].trim();
        if (!seenColours.has(c)) {
          seenColours.add(c);
          uniqueColours.push({
            name: s.colour,
            displayName: c,
            sku: s.sku
          });
        }
      });

      // Sizes / Types from s.variantName
      const types = [];
      siblings.forEach(s => {
        const typeName = s.variantName || s.name;
        if (typeName && !types.includes(typeName)) {
          types.push(typeName);
        }
      });

      const cat = (window.ALT_CATEGORIES || []).find(c => c.id === p.categoryId);
      const sub = cat ? cat.parent : '';
      const parentGroup = p.categoryId.startsWith('towels-') ? 'towels'
                        : p.categoryId === 'tea-towels'       ? 'tea-towels'
                        : p.categoryId.startsWith('sheets-')  ? 'sheets'
                        : p.categoryId === 'quilt-covers'     ? 'quilt-covers'
                        : p.categoryId.startsWith('quilts-')  ? 'quilts'
                        : p.categoryId.startsWith('blankets-')? 'blankets'
                        : p.categoryId.startsWith('mp-')      ? 'mattress'
                        : p.categoryId === 'pillows'          ? 'pillows'
                        : p.categoryId;

      list.push({
        id: primaryProduct.sku,
        sku: primaryProduct.sku,
        cat: parentGroup,
        subcat: p.categoryId,
        name: name,
        desc: desc,
        sub: sub,
        img: primaryProduct.image,
        tag: tag,
        isRange: true,
        parentSku: p.parentSku,
        colours: uniqueColours,
        sizes: types,
        weight: primaryProduct.weight || ''
      });
    } else {
      const cat = (window.ALT_CATEGORIES || []).find(c => c.id === p.categoryId);
      const sub = cat ? cat.parent : '';
      const sizes = [];
      if (p.size) sizes.push(p.size);
      if (p.weight) sizes.push(p.weight);
      const parentGroup = p.categoryId.startsWith('towels-') ? 'towels'
                        : p.categoryId === 'tea-towels'       ? 'tea-towels'
                        : p.categoryId.startsWith('sheets-')  ? 'sheets'
                        : p.categoryId === 'quilt-covers'     ? 'quilt-covers'
                        : p.categoryId.startsWith('quilts-')  ? 'quilts'
                        : p.categoryId.startsWith('blankets-')? 'blankets'
                        : p.categoryId.startsWith('mp-')      ? 'mattress'
                        : p.categoryId === 'pillows'          ? 'pillows'
                        : p.categoryId;

      list.push({
        id: p.sku,
        sku: p.sku,
        cat: parentGroup,
        subcat: p.categoryId,
        name: p.name,
        colour: p.colour,
        sub: sub,
        desc: p.description,
        sizes: sizes,
        img: p.image,
        tag: p.tag,
        isRange: false,
        weight: p.weight || ''
      });
    }
  });

  return list;
})();

// ──────────────────────────────────────────────
// Count products per subcat
// ──────────────────────────────────────────────
function countForSubcat(subcatId){
  return PRODUCTS.filter(p => p.subcat === subcatId).length;
}

// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let activeSubcat  = null; // null = show all
let activeColour  = null;
let activeGSM     = null; // 'light' | '450-500' | '550-600' | 'heavy'
let activeMaterial= null;

// ──────────────────────────────────────────────
// Colour → CSS value map
// ──────────────────────────────────────────────
const QF_COLOUR_CSS = {
  'White':'#fff','Black':'#1a1a1a','Charcoal':'#606060','Camel':'#c19a6b',
  'Navy':'#1a3060','Royal Blue':'#2563eb','Blue':'#3b82f6','Aqua':'#06b6d4',
  'Beige':'#e8d5b0','Pink':'#f9a8d4','Purple':'#a855f7','Fuchsia':'#d946ef',
  'Mint':'#6ee7b7','Lime':'#84cc16','Cherry':'#be123c','Garnet':'#881337',
  'Latte':'#c4a882','Coffee':'#6f4e37'
};

// ──────────────────────────────────────────────
// GSM groups
// ──────────────────────────────────────────────
const GSM_GROUPS = [
  { key:'light',    label:'≤ 400 GSM', test: v => v <= 400 },
  { key:'450-500',  label:'450–500 GSM', test: v => v >= 401 && v <= 500 },
  { key:'550-600',  label:'550–600 GSM', test: v => v >= 501 && v <= 650 },
  { key:'heavy',    label:'700+ GSM',  test: v => v >= 651 },
];

// ──────────────────────────────────────────────
// Material → simplified label map
// ──────────────────────────────────────────────
const MAT_LABEL = {
  '100% Cotton':'Cotton','100% Combed Cotton':'Combed Cotton',
  '100% Cotton Terry':'Terry','100% Cotton Waffle':'Waffle',
  '50% Cotton/50% Polyester':'Cotton/Poly',
  'Cotton/Polyester':'Cotton/Poly','Cotton/Polyester Blend':'Cotton/Poly',
  'Cotton/Polyester Waterproof':'Waterproof',
  'Faux Wool/Polar Fleece':'Fleece','Microfibre':'Microfibre'
};

// ──────────────────────────────────────────────
// Quick-filter helpers — operate on any list
// ──────────────────────────────────────────────
function _qfColours(list){
  const s = new Set();
  list.forEach(p => {
    if(p.isRange) p.colours?.forEach(c => s.add(c.displayName));
    else if(p.colour) s.add(p.colour);
  });
  return [...s].sort();
}
function _qfGsmGroups(list){
  const s = new Set();
  list.forEach(p => {
    const v = parseInt(p.weight);
    if(!isNaN(v)) GSM_GROUPS.forEach(g => { if(g.test(v)) s.add(g.key); });
  });
  return GSM_GROUPS.filter(g => s.has(g.key));
}
function _qfMaterials(list){
  const m = new Map();
  list.forEach(p => {
    const simple = MAT_LABEL[p.material||''] || p.material || '';
    if(simple) m.set(simple, 1);
  });
  return [...m.keys()].sort();
}
function _applyColour(list){
  if(!activeColour) return list;
  return list.filter(p => p.isRange
    ? p.colours?.some(c => c.displayName === activeColour)
    : p.colour === activeColour);
}
function _applyGSM(list){
  if(!activeGSM) return list;
  const g = GSM_GROUPS.find(g => g.key === activeGSM);
  return g ? list.filter(p => { const v=parseInt(p.weight); return !isNaN(v)&&g.test(v); }) : list;
}
function _applyMaterial(list){
  if(!activeMaterial) return list;
  return list.filter(p => (MAT_LABEL[p.material||'']||p.material||'') === activeMaterial);
}

// ──────────────────────────────────────────────
// Dynamic quick-filter pills — called from renderProducts
// Shows INSIDE the search panel, below the input
// Only visible when user has typed OR selected a category
// Facets computed from baseList with OTHER active filters applied
// ──────────────────────────────────────────────
function updateQuickFilters(baseList){
  const panel   = document.getElementById('quickFilters');
  const colourRow = document.getElementById('qfColourRow');
  const gsmRow    = document.getElementById('qfGsmRow');
  const matRow    = document.getElementById('qfMatRow');
  const colourPills = document.getElementById('qfColourPills');
  const gsmPills    = document.getElementById('qfGsmPills');
  const matPills    = document.getElementById('qfMatPills');
  if(!panel) return;

  // Only show filter panel when user has narrowed down (search or category)
  const q = (document.getElementById('collectionSearch')?.value || '').trim();
  const isNarrowed = q.length > 0 || activeSubcat !== null;
  if(!isNarrowed || baseList.length === 0){
    panel.style.display = 'none';
    return;
  }

  // ── Compute facets (each from baseList with other 2 filters applied) ──
  const colourBase = _applyMaterial(_applyGSM(baseList));
  const availColours = _qfColours(colourBase);
  if(activeColour && !availColours.includes(activeColour)) activeColour = null;

  const gsmBase = _applyMaterial(_applyColour(baseList));
  const availGSM = _qfGsmGroups(gsmBase);
  if(activeGSM && !availGSM.find(g => g.key === activeGSM)) activeGSM = null;

  const matBase = _applyGSM(_applyColour(baseList));
  const availMats = _qfMaterials(matBase);
  if(activeMaterial && !availMats.includes(activeMaterial)) activeMaterial = null;

  // ── Colour row ──
  if(availColours.length <= 1){
    colourRow.style.display = 'none';
  } else {
    colourRow.style.display = '';
    colourPills.innerHTML = availColours.map(col => {
      const css = QF_COLOUR_CSS[col];
      const isStripe = col.includes('Stripe') || col.includes('White/');
      let dot = '';
      if(isStripe){
        dot = `<span class="${col.includes('Black')?'qf-dot stripe-bk':'qf-dot stripe'}"></span>`;
      } else if(css){
        dot = `<span class="qf-dot" style="background:${css};${col==='White'?'border:1px solid #ccc8be;':''}"></span>`;
      }
      return `<button class="qf-pill${activeColour===col?' active':''}" onclick="setQFColour('${col}')" data-colour="${col}">${dot}${col}</button>`;
    }).join('');
  }

  // ── GSM row ──
  if(availGSM.length <= 1){
    gsmRow.style.display = 'none';
  } else {
    gsmRow.style.display = '';
    gsmPills.innerHTML = availGSM.map(g =>
      `<button class="qf-pill${activeGSM===g.key?' active':''}" onclick="setQFGsm('${g.key}')" data-gsm="${g.key}">${g.label}</button>`
    ).join('');
  }

  // ── Material row ──
  if(availMats.length <= 1){
    matRow.style.display = 'none';
  } else {
    matRow.style.display = '';
    matPills.innerHTML = availMats.map(label =>
      `<button class="qf-pill${activeMaterial===label?' active':''}" onclick="setQFMat('${label}')" data-mat="${label}">${label}</button>`
    ).join('');
  }

  // ── Clear button ──
  const btn = document.getElementById('qfClearAll');
  if(btn) btn.style.display = (activeColour || activeGSM || activeMaterial) ? 'inline' : 'none';

  // ── Show/hide the filter section ──
  const anyRow = [colourRow, gsmRow, matRow].some(r => r.style.display !== 'none');
  panel.style.display = anyRow ? 'block' : 'none';
}

function setQFColour(col){
  activeColour = activeColour === col ? null : col;
  renderProducts();
}
function setQFGsm(key){
  activeGSM = activeGSM === key ? null : key;
  renderProducts();
}
function setQFMat(label){
  activeMaterial = activeMaterial === label ? null : label;
  renderProducts();
}
function clearAllQF(){
  activeColour = null; activeGSM = null; activeMaterial = null;
  renderProducts();
}

// ──────────────────────────────────────────────
// Build sidebar
// ──────────────────────────────────────────────
function buildSidebar(){
  const tree = document.getElementById('catTree');
  tree.innerHTML = '';

  // "All Products" button
  const allBtn = document.createElement('div');
  allBtn.className = 'cat-group';
  allBtn.innerHTML = `<button class="cat-parent" id="btn-all" onclick="selectAll()">All Products</button>`;
  tree.appendChild(allBtn);

  CATEGORIES.forEach(cat => {
    const group = document.createElement('div');
    group.className = 'cat-group';

    const hasSubs = cat.subs.length > 0;
    const anyProducts = cat.subs.some(s => countForSubcat(s.id) > 0);
    const activeCount = cat.subs.reduce((sum, s) => sum + countForSubcat(s.id), 0);

    group.innerHTML = `
      <button class="cat-parent" id="parent-${cat.id}" onclick="toggleCat('${cat.id}')">
        <span>${cat.label}</span>
        <span style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          ${activeCount > 0 ? `<span class="count">${activeCount}</span>` : ''}
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 9l6 6 6-6"/></svg>
        </span>
      </button>
      <div class="sub-list" id="subs-${cat.id}">
        ${cat.subs.map(s => {
          const count = countForSubcat(s.id);
          const isComing = count === 0;
          return `<button class="sub-item${isComing?' coming':''}" id="sub-${s.id}" onclick="selectSubcat('${s.id}','${s.label}',${isComing})">
            ${s.label}
            ${isComing
              ? `<span class="cs-badge" style="font-size:9px;color:#c9a84c;letter-spacing:.06em;text-transform:uppercase;">Enquire</span>`
              : `<span class="count">${count}</span>`
            }
          </button>`;
        }).join('')}
      </div>
    `;
    tree.appendChild(group);
  });

  // Auto-open first cat that has products
  toggleCat('towels');
}

function toggleCat(catId){
  const subList = document.getElementById(`subs-${catId}`);
  const parentBtn = document.getElementById(`parent-${catId}`);
  if(!subList) return;
  const isOpen = subList.classList.contains('open');
  // close all
  document.querySelectorAll('.sub-list').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.cat-parent').forEach(el => el.classList.remove('open'));
  if(!isOpen){
    subList.classList.add('open');
    parentBtn?.classList.add('open');
  }
}

// ──────────────────────────────────────────────
// Select / filter
// ──────────────────────────────────────────────
function selectAll(){
  activeSubcat = null;
  document.querySelectorAll('.sub-item,.cat-parent').forEach(el => el.classList.remove('active'));
  document.getElementById('btn-all')?.classList.add('active');
  renderProducts();
  updateFilterBar('All Products', false);
  hideSidebarMobile();
}

function selectSubcat(subcatId, label, isComing){
  activeSubcat = subcatId;
  // highlight
  document.querySelectorAll('.sub-item,.cat-parent').forEach(el => el.classList.remove('active'));
  document.getElementById(`sub-${subcatId}`)?.classList.add('active');

  if(isComing){
    document.getElementById('comingSoonPanel').classList.add('visible');
    document.getElementById('productGrid').style.display='none';
    updateFilterBar(label, true);
    // Set enquiry link with category pre-filled
    var btn = document.getElementById('enquireCatBtn');
    if(btn) btn.href = 'contact.html?cat=' + encodeURIComponent(label);
  } else {
    document.getElementById('comingSoonPanel').classList.remove('visible');
    document.getElementById('productGrid').style.display='';
    renderProducts();
    updateFilterBar(label, false);
  }
  hideSidebarMobile();
}

function updateFilterBar(label, isComing){
  const info = document.getElementById('filterInfo');
  if(!info) return;
  if(label==='All Products'){
    info.innerHTML = `<span class="showing" id="showingText">Showing all ${PRODUCTS.length} products</span>`;
  } else if(isComing){
    info.innerHTML = `<span class="showing">Category: </span>
      <span class="active-filter">${label} <button class="clear" onclick="selectAll()">×</button></span>
      <a href="contact.html" style="font-size:12px;color:#c9a84c;border-bottom:1px solid #d4b568;text-decoration:none;cursor:pointer;">· Enquire for pricing →</a>`;
  } else {
    const q = (document.getElementById('collectionSearch')?.value || '').trim();
    const count = q
      ? PRODUCTS.filter(p => p.subcat===activeSubcat && (
          (p.name && p.name.toLowerCase().includes(q.toLowerCase()))
          || (p.colours && p.colours.some(c => c.displayName.toLowerCase().includes(q.toLowerCase())))
          || (p.colour && p.colour.toLowerCase().includes(q.toLowerCase()))
          || (p.material && p.material.toLowerCase().includes(q.toLowerCase()))
        )).length
      : PRODUCTS.filter(p => p.subcat===activeSubcat).length;
    info.innerHTML = `<span class="showing">Category: </span>
      <span class="active-filter">${label} <button class="clear" onclick="selectAll()">×</button></span>
      <span class="showing">${count} product${count!==1?'s':''}</span>`;
  }
}

// ──────────────────────────────────────────────
// Render products
// ──────────────────────────────────────────────
function renderProducts(){
  const grid = document.getElementById('productGrid');

  // ── Step 1: Base list — category + search only ─
  let baseList = activeSubcat
    ? PRODUCTS.filter(p => p.subcat === activeSubcat)
    : PRODUCTS;

  const q = (document.getElementById('collectionSearch')?.value || '').trim().toLowerCase();
  if(q){
    baseList = baseList.filter(p =>
      (p.name && p.name.toLowerCase().includes(q))
      || (p.colours && p.colours.some(c => c.displayName.toLowerCase().includes(q)))
      || (p.colour && p.colour.toLowerCase().includes(q))
      || (p.material && p.material.toLowerCase().includes(q))
      || (p.weight && p.weight.toLowerCase().includes(q))
    );
  }

  // ── Step 2: Update filter pills from base list ─
  updateQuickFilters(baseList);

  // ── Step 3: Apply quick filters on top ─────────
  let list = _applyMaterial(_applyGSM(_applyColour(baseList)));

  if(list.length===0){
    const activeQF = [activeColour, activeGSM ? GSM_GROUPS.find(g=>g.key===activeGSM)?.label : null, activeMaterial].filter(Boolean);
    const qfMsg = activeQF.length ? ` with ${activeQF.join(', ')}` : '';
    grid.innerHTML = `<p style="color:var(--muted);font-size:14px;padding:40px 0;">No products found${q ? ' for "'+q+'"' : ''}${qfMsg}. <button onclick="clearAllQF()" style="color:var(--gold2);background:none;border:none;cursor:pointer;text-decoration:underline;font-size:14px;">Clear filters</button></p>`;
    const showEl = document.getElementById('showingText');
    if(showEl) showEl.textContent = '0 products';
    return;
  }

  // Update showing count
  const showEl = document.getElementById('showingText');
  if(showEl && !activeSubcat){
    if(q || activeColour || activeGSM || activeMaterial){
      showEl.textContent = list.length + ' product' + (list.length!==1?'s':'') + ' found';
    }
  } else if(showEl && activeSubcat){
    showEl.textContent = list.length + ' product' + (list.length!==1?'s':'');
  }

  // ── Sort ──────────────────────────────────────
  const sortVal = document.getElementById('sortSelect')?.value || 'default';
  if (sortVal === 'gsm-high') {
    list = [...list].sort((a, b) => (parseInt(b.weight) || 0) - (parseInt(a.weight) || 0));
  } else if (sortVal === 'gsm-low') {
    list = [...list].sort((a, b) => (parseInt(a.weight) || 9999) - (parseInt(b.weight) || 9999));
  } else if (sortVal === 'name-az') {
    list = [...list].sort((a, b) => a.name.localeCompare(b.name));
  }

  // Remove skeleton loader
  const sk = document.getElementById('skeletonGrid');
  if (sk) sk.remove();

  grid.innerHTML = list.map(p => {
    const isPh = window.ALT_HELPERS && window.ALT_HELPERS.isPlaceholderImage(p.img);
    if (p.isRange) {
      const swatchHtml = p.colours.map(col => {
        let dotColor = col.displayName.toLowerCase().replace('charcoal / grey', 'charcoal').replace('royal blue', 'royal').replace('navy blue', 'navy').split('/')[0].trim().replace(' ', '-');
        return `<span class="sw-dot-circle dot ${dotColor}" title="${col.displayName}" style="display:inline-block;width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,0.15);margin-right:4px;"></span>`;
      }).join('');

      return `
      <div class="product-card">
        <a class="pc-link" href="product.html?sku=${p.sku}" aria-label="View ${p.name}"></a>
        <div class="product-img${isPh ? ' product-img-placeholder' : ''}">
          <img src="${p.img}" alt="${p.name}" loading="lazy"
            onerror="this.onerror=null;this.src='images/placeholder-product.svg'"/>
          <div class="delivery-badge">Free Delivery $100+</div>
          ${p.tag ? `<div class="product-tag">${p.tag}</div>` : ''}
          ${isPh ? '<div class="photo-pending">Photo on request</div>' : ''}
        </div>
        <div class="product-info">
          <div class="product-sub">${p.sub}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>

          <!-- Available Colours -->
          <div style="margin-bottom:12px; display:flex; align-items:center; flex-wrap:wrap; gap:4px;">
            <span style="font-size:10px; color:var(--muted); text-transform:uppercase; margin-right:4px;">Colours:</span>
            ${swatchHtml}
          </div>

          ${p.sizes.length ? `<div class="product-sizes" style="gap:4px;">${p.sizes.map(s=>`<span class="sz" style="font-size:9.5px; padding:2px 6px;">${s}</span>`).join('')}</div>` : ''}
          <button class="product-cta" onclick="event.stopPropagation();enquireRange('${p.sku}', '${p.name}')">Request Quote</button>
        </div>
      </div>
      `;
    } else {
      return `
      <div class="product-card">
        <a class="pc-link" href="product.html?sku=${p.sku}" aria-label="View ${p.name}"></a>
        <div class="product-img${isPh ? ' product-img-placeholder' : ''}">
          <img src="${p.img}" alt="${p.name}" loading="lazy"
            onerror="this.onerror=null;this.src='images/placeholder-product.svg'"/>
          <div class="delivery-badge">Free Delivery $100+</div>
          ${p.tag ? `<div class="product-tag">${p.tag}</div>` : ''}
          ${isPh ? '<div class="photo-pending">Photo on request</div>' : ''}
        </div>
        <div class="product-info">
          <div class="product-sub">${p.sub}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          ${p.sizes.length ? `<div class="product-sizes">${p.sizes.map(s=>`<span class="sz">${s}</span>`).join('')}</div>` : ''}
          <button class="product-cta" onclick="event.stopPropagation();enquire('${p.sku}')">Request Quote</button>
        </div>
      </div>
      `;
    }
  }).join('');
}

function enquire(id){
  const p = PRODUCTS.find(x => String(x.id) === String(id));
  if(!p) return;
  const t = document.getElementById('toast');
  t.textContent = `Enquiry for "${p.name}" — redirecting…`;
  t.classList.add('show');
  const lines = [`Product: ${p.name}${p.colour ? ' — ' + p.colour : ''}`, `Spec: ${p.sizes.join(' · ')}`];
  const msg = `Hi, I'd like to enquire about the following product:\n\n${lines.join('\n')}\n\nPlease provide pricing and availability for my requirements.`;
  setTimeout(()=>{
    t.classList.remove('show');
    sessionStorage.setItem('alt_enquiry', msg);
    window.location.href = 'contact.html';
  }, 1200);
}

// ──────────────────────────────────────────────
// Mobile sidebar toggle
// ──────────────────────────────────────────────
function toggleSidebar(){
  const content = document.getElementById('sidebarContent');
  const chevron = document.getElementById('sidebarChevron');
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open');
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}
function hideSidebarMobile(){
  if(window.innerWidth <= 900){
    document.getElementById('sidebarContent')?.classList.remove('open');
    document.getElementById('sidebarChevron').style.transform = '';
  }
}

// ──────────────────────────────────────────────
// URL param support: ?cat=subcatId
// ──────────────────────────────────────────────
function checkUrlParam(){
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('cat');
  if(cat){
    // find label
    let label = cat, isComing = false;
    for(const c of CATEGORIES){
      const sub = c.subs.find(s => s.id === cat);
      if(sub){
        label = sub.label;
        isComing = countForSubcat(cat) === 0;
        // open parent
        toggleCat(c.id);
        break;
      }
    }
    selectSubcat(cat, label, isComing);
  } else {
    selectAll();
  }
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  checkUrlParam();

  // ── Search input wiring ──────────────────────
  const searchInput = document.getElementById('collectionSearch');
  const searchClear = document.getElementById('searchClear');

  if(searchInput){
    searchInput.addEventListener('input', () => {
      const hasVal = searchInput.value.length > 0;
      searchClear.classList.toggle('visible', hasVal);
      renderProducts();
      // Reset showing text if search cleared
      if(!hasVal){
        const showEl = document.getElementById('showingText');
        if(showEl && !activeSubcat){
          showEl.textContent = 'Showing all ' + PRODUCTS.length + ' products';
        }
      }
    });
  }

  if(searchClear){
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      renderProducts();
      const showEl = document.getElementById('showingText');
      if(showEl && !activeSubcat) showEl.textContent = 'Showing all ' + PRODUCTS.length + ' products';
      searchInput.focus();
    });
  }
});
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Product — Australian Linen &amp; Towels</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" sizes="48x48" href="images/favicon-48.png"/>
<link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="images/favicon-192.png"/>
<link rel="apple-touch-icon" href="images/apple-touch-icon.png"/>
<meta name="theme-color" content="#1a1f4e"/>
<meta name="description" id="metaDesc" content="Premium commercial linen for Australian hotels, motels, spas, and short-stay properties. Trade pricing — contact for quote."/>
<meta property="og:type" content="product"/>
<meta property="og:title" id="ogTitle" content="Australian Linen &amp; Towels"/>
<meta property="og:description" id="ogDesc" content=""/>
<meta property="og:image" id="ogImage" content="https://auslinenandtowels.com.au/images/logo-header.png"/>
<meta property="og:site_name" content="Australian Linen &amp; Towels"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="canonical" id="canonicalLink" href="https://auslinenandtowels.com.au/product.html"/>
<script type="application/ld+json" id="productSchema"></script>
<script type="application/ld+json" id="breadcrumbSchema"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css"/>
<style>
  .pd-wrap { background: var(--paper); padding: 40px 0 100px; }
  .pd-breadcrumb { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 32px; padding: 0 48px; max-width: 1440px; margin-left: auto; margin-right: auto; }
  .pd-breadcrumb a { color: var(--muted); }
  .pd-breadcrumb a:hover { color: var(--navy); }
  .pd-breadcrumb .sep { margin: 0 10px; color: var(--line); }
  .pd-main { display: grid; grid-template-columns: 1.1fr 1fr; gap: 72px; padding: 0 48px; max-width: 1440px; margin: 0 auto; }

  .pd-gallery .main-img { aspect-ratio: 1; background: var(--ivory-2); overflow: hidden; margin-bottom: 16px; position: relative; cursor: zoom-in; }
  .pd-gallery .main-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.1s ease-out; transform-origin: center center; }
  .pd-gallery .main-img:hover img { transform: scale(2.2); }
  .pd-gallery .main-img-placeholder img { opacity: .92; }
  .pd-photo-pending {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: rgba(26,31,78,.88); color: #fff;
    font-family: var(--f-mono); font-size: 11px; letter-spacing: .08em;
    padding: 12px 16px; text-align: center;
  }
  .pd-photo-pending a { color: var(--gold-soft); border-bottom: 1px solid var(--gold-soft); }
  .pd-gallery .thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .pd-gallery .thumb { aspect-ratio: 1; background: var(--ivory-2); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .pd-gallery .thumb.active { border-color: var(--navy); }
  .pd-gallery .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .pd-info .category { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
  .pd-info h1 { font-family: var(--f-serif); font-size: 50px; font-weight: 400; line-height: 1.05; letter-spacing: -0.01em; color: var(--navy); margin-bottom: 8px; }
  .pd-info h1 em { font-style: italic; color: var(--gold); }
  .pd-info .subtitle { font-size: 16px; color: var(--muted); margin-bottom: 28px; }
  .pd-info .price-block { padding: 24px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 32px; }
  .pd-info .price { font-family: var(--f-serif); font-size: 44px; color: var(--navy); font-weight: 400; line-height: 1; }
  .pd-info .price-note { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

  .spec-table { display: grid; grid-template-columns: auto 1fr; gap: 14px 32px; margin-bottom: 32px; }
  .spec-table .k { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); padding-top: 2px; }
  .spec-table .v { font-size: 14.5px; color: var(--ink); }

  .pd-actions { display: flex; gap: 14px; margin-bottom: 36px; }
  .pd-actions .btn-primary { background: var(--navy); color: var(--paper); padding: 16px 32px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; flex: 1; text-align: center; transition: background 0.2s; }
  .pd-actions .btn-primary:hover { background: var(--navy-2); }
  .pd-actions .btn-gold { background: var(--gold); color: var(--paper); padding: 16px 32px; font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; text-decoration: none; flex: 1; text-align: center; transition: background 0.2s; }
  .pd-actions .btn-gold:hover { background: var(--gold-soft); }

  .pd-features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 24px; background: var(--ivory-2); margin-bottom: 32px; }
  .pd-feat { display: flex; gap: 12px; align-items: center; }
  .pd-feat .ico { color: var(--gold); }
  .pd-feat .ico svg { width: 20px; height: 20px; }
  .pd-feat h5 { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--navy); margin-bottom: 2px; font-weight: 500; }
  .pd-feat p { font-size: 11.5px; color: var(--muted); }

  .pd-description { padding-top: 24px; border-top: 1px solid var(--line); }
  .pd-description h4 { font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy); margin-bottom: 16px; }
  .pd-description p { font-size: 14.5px; line-height: 1.8; color: var(--ink); }

  /* Type/Size buttons styling */
  .type-btn:hover {
    border-color: var(--navy) !important;
    background: var(--ivory-2) !important;
  }
  .type-btn.active {
    border-color: var(--navy) !important;
    background: var(--navy) !important;
    color: #fff !important;
    font-weight: 600 !important;
  }

  /* Colour swatches block */
  .pd-colours {
    padding: 20px 0;
    border-top: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .pd-colours h4 {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 14px;
  }
  .pd-colours .swatches {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .sw {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 6px;
    border: 1px solid var(--line);
    border-radius: 30px;
    font-size: 12px;
    color: var(--ink);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
  }
  .sw:hover {
    border-color: var(--gold);
    background: var(--ivory-2);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(28, 43, 126, 0.08);
  }
  .sw.active {
    border-color: var(--navy);
    background: var(--ivory-2);
    color: var(--navy);
    font-weight: 500;
    box-shadow: inset 0 0 0 1px var(--navy);
  }
  .sw .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .sw .dot.white        { background: #ffffff; border-color: #d6d1c4; }
  .sw .dot.charcoal     { background: #3a3a45; }
  .sw .dot.camel        { background: #c9b086; }
  .sw .dot.black        { background: #1a1a1a; }
  .sw .dot.navy         { background: #1C2B7E; }
  .sw .dot.aqua         { background: #57cc99; }
  .sw .dot.cherry       { background: #ba0404; }
  .sw .dot.coffee       { background: #582f0e; }
  .sw .dot.fuchsia      { background: #f72585; }
  .sw .dot.garnet       { background: #6f1d1b; }
  .sw .dot.lime         { background: #9ef01a; }
  .sw .dot.mirage       { background: #83c5be; }
  .sw .dot.pink         { background: #ffb5a7; }
  .sw .dot.purple       { background: #7209b7; }
  .sw .dot.royal        { background: #1B2A7A; }
  /* Additional colours */
  .sw .dot.beige        { background: #d9c4a8; border-color: #c4ae91; }
  .sw .dot.blue         { background: #4a90d9; }
  .sw .dot.latte        { background: #c4a97a; border-color: #b09060; }
  .sw .dot.mint         { background: #98d8c8; }
  .sw .dot.blue-stripe  { background: linear-gradient(135deg, #fff 40%, #4a90d9 40%); border-color: #c0c8d8; }
  .sw .dot.white-stripe { background: linear-gradient(135deg, #fff 40%, #c9b086 40%); border-color: #d6d1c4; }
  .sw .dot.more {
    background: var(--ivory-2);
    color: var(--gold);
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }
  .pd-colours .note {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.55;
  }
  .pd-colours .note a {
    color: var(--navy);
    border-bottom: 1px solid var(--gold);
    padding-bottom: 1px;
  }

  .related { background: var(--ivory); padding: 80px 0; }
  .related .wrap { max-width: 1440px; margin: 0 auto; padding: 0 48px; }
  .related h3 { font-family: var(--f-serif); font-size: 36px; font-weight: 400; color: var(--navy); margin-bottom: 32px; letter-spacing: -0.01em; }
  .related h3 em { font-style: italic; color: var(--gold); }
  .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .r-card { background: var(--paper); border: 1px solid var(--line); text-decoration: none; color: inherit; transition: border-color 0.2s; }
  .r-card:hover { border-color: var(--gold); }
  .r-card .img { aspect-ratio: 1; background: var(--ivory-2); overflow: hidden; }
  .r-card .img img { width: 100%; height: 100%; object-fit: cover; }
  .r-card .body { padding: 18px; }
  .r-card .title { font-family: var(--f-serif); font-size: 17px; color: var(--navy); margin-bottom: 4px; }
  .r-card .price { font-family: var(--f-mono); font-size: 12px; color: var(--muted); }

  @media (max-width: 968px) {
    .pd-main { grid-template-columns: 1fr; gap: 24px; padding: 0 16px; }
    .pd-breadcrumb { padding: 0 16px; font-size: 9.5px; margin-bottom: 20px; }
    .pd-breadcrumb .sep { margin: 0 6px; }
    .pd-info h1 { font-size: 32px; line-height: 1.1; text-wrap: balance; }
    .pd-info .subtitle { font-size: 14px; margin-bottom: 20px; }
    .pd-info .price-block { padding: 18px 0; margin-bottom: 24px; }
    .pd-info .price { font-size: 34px; }
    .pd-info .price-note { font-size: 10px; }
    .spec-table { grid-template-columns: 100px 1fr; gap: 10px 16px; font-size: 13px; }
    .spec-table .k { font-size: 10px; }
    .spec-table .v { font-size: 13.5px; }
    .pd-actions { flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .pd-actions .btn-primary, .pd-actions .btn-gold { padding: 16px 24px; min-height: 52px; display: flex; align-items: center; justify-content: center; }
    .pd-features { grid-template-columns: 1fr 1fr; gap: 12px; padding: 18px; }
    .pd-feat h5 { font-size: 9.5px; }
    .pd-feat p { font-size: 10.5px; line-height: 1.4; }
    .pd-description h4 { font-size: 10.5px; }
    .pd-description p { font-size: 14px; line-height: 1.7; }
    .related { padding: 48px 0; }
    .related .wrap { padding: 0 16px; }
    .related h3 { font-size: 28px; margin-bottom: 20px; }
    .related-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .r-card .title { font-size: 14px; }
    .r-card .price { font-size: 11px; }
  }

  @media (max-width: 480px) {
    .pd-info h1 { font-size: 28px; }
    .pd-features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body data-page="product">
<div data-header></div>

<div class="pd-wrap">
  <div class="pd-breadcrumb" id="breadcrumb">
    <a href="index.html">Home</a>
    <span class="sep">/</span>
    <a href="collection.html">Collection</a>
    <span class="sep">/</span>
    <span id="crumbName">Loading...</span>
  </div>

  <div class="pd-main" id="pdMain">
    <div style="grid-column: 1 / -1; text-align: center; padding: 80px 0;">
      <p style="color: var(--muted);">Loading product...</p>
    </div>
  </div>
</div>

<section class="related" id="relatedSection" style="display:none;">
  <div class="wrap">
    <h3>Related <em>items</em></h3>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</section>

<div data-footer></div>

<script src="assets/products-data.js"></script>
<script src="assets/partials.js"></script>
<script>
  function renderProductPage(targetSku) {
    const currentProduct = window.ALT_HELPERS.getProductBySku(targetSku);
    if (!currentProduct) {
      document.getElementById('pdMain').innerHTML = `
        <div style="grid-column: 1 / -1; text-align: center; padding: 80px 0;">
          <h2 style="font-family: var(--f-serif); font-size: 36px; color: var(--navy); margin-bottom: 16px;">Product not found</h2>
          <p style="color: var(--muted); margin-bottom: 24px;">The product you're looking for doesn't exist in our catalogue.</p>
          <a href="collection.html" style="font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--navy); border-bottom: 1px solid var(--gold); padding-bottom: 3px;">Return to Collection →</a>
        </div>
      `;
      return;
    }

    // Update URL silently
    const newUrl = `${window.location.pathname}?sku=${currentProduct.sku}`;
    window.history.replaceState({ sku: currentProduct.sku }, '', newUrl);

    // Update document metadata & SEO dynamically
    let pageTitle = `${currentProduct.name} (${currentProduct.colour})`;
    if (currentProduct.parentSku) {
      const parentInfo = window.ALT_PARENTS && window.ALT_PARENTS[currentProduct.parentSku];
      if (parentInfo) {
        pageTitle = `${parentInfo.name} — ${currentProduct.name} (${currentProduct.colour})`;
      }
    }
    document.title = `${pageTitle} — Wholesale Commercial Linen | Australian Linen & Towels`;
    document.getElementById('crumbName').textContent = currentProduct.name;
    
    const cat = window.ALT_HELPERS.getCategoryById(currentProduct.categoryId);
    
    // SEO dynamic meta and OpenGraph updating
    const canonical = `https://auslinenandtowels.com.au/product.html?sku=${currentProduct.sku}`;
    const shortDesc = (currentProduct.description || '').split('. ').slice(0, 2).join('. ').slice(0, 160);
    const ogImg = currentProduct.image && currentProduct.image.indexOf('placeholder') === -1
      ? `https://auslinenandtowels.com.au/${currentProduct.image}`
      : 'https://auslinenandtowels.com.au/images/logo-header.png';
      
    document.getElementById('metaDesc')?.setAttribute('content', shortDesc);
    document.getElementById('ogTitle')?.setAttribute('content', pageTitle);
    document.getElementById('ogDesc')?.setAttribute('content', shortDesc);
    document.getElementById('ogImage')?.setAttribute('content', ogImg);
    document.getElementById('canonicalLink')?.setAttribute('href', canonical);

    // Schema update
    const productSchemaEl = document.getElementById('productSchema');
    if (productSchemaEl) {
      productSchemaEl.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Product",
        "name": pageTitle,
        "sku": currentProduct.sku,
        "description": currentProduct.description,
        "image": ogImg,
        "category": cat ? (cat.parent + ' · ' + cat.name) : 'Commercial Linen',
        "brand": { "@type": "Brand", "name": "Australian Linen & Towels" },
        "material": currentProduct.material || '',
        "size": currentProduct.size || '',
        "weight": currentProduct.weight ? { "@type": "QuantitativeValue", "value": currentProduct.weight, "unitText": "GSM" } : undefined,
        "offers": {
          "@type": "Offer",
          "url": canonical,
          "priceCurrency": "AUD",
          "price": "0.00",
          "availability": "https://schema.org/InStock",
          "seller": { "@type": "Organization", "name": "Australian Linen & Towels" }
        }
      });
    }

    // Breadcrumbs update
    const breadcrumbSchemaEl = document.getElementById('breadcrumbSchema');
    if (breadcrumbSchemaEl) {
      breadcrumbSchemaEl.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://auslinenandtowels.com.au/" },
          { "@type": "ListItem", "position": 2, "name": "Collection", "item": "https://auslinenandtowels.com.au/collection.html" },
          { "@type": "ListItem", "position": 3, "name": cat ? cat.name : 'Product', "item": `https://auslinenandtowels.com.au/collection.html?cat=${currentProduct.categoryId}` },
          { "@type": "ListItem", "position": 4, "name": currentProduct.name }
        ]
      });
    }

    // Render components
    const isPh = window.ALT_HELPERS.isPlaceholderImage(currentProduct.image);
    
    // Sibling and config blocks
    let configBlockHtml = '';
    if (currentProduct.parentSku) {
      const siblings = window.ALT_PRODUCTS.filter(s => s.parentSku === currentProduct.parentSku);
      
      // 1. Get unique type names using s.variantName || s.name
      const uniqueTypes = [];
      const seenNames = new Set();
      siblings.forEach(s => {
        if (!seenNames.has(s.name)) {
          seenNames.add(s.name);
          uniqueTypes.push({
            name: s.name,
            displayName: s.variantName || s.name,
            sku: s.sku,
            size: s.size,
            weight: s.weight
          });
        }
      });

      // Types Buttons HTML
      const typesHtml = uniqueTypes.map(t => {
        const activeClass = t.name === currentProduct.name ? 'active' : '';
        const style = `
          padding: 10px 16px;
          font-family: var(--f-mono);
          font-size: 11px;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          border: 1px solid var(--line);
          background: #fff;
          cursor: pointer;
          transition: all 0.2s;
          border-radius: 2px;
        `;
        return `
          <button class="type-btn ${activeClass}" 
            style="${style}" 
            onclick="switchType('${t.name}')">
            ${t.displayName}
          </button>
        `;
      }).join('');

      // 2. Get colors available for this specific type name — deduplicate by colour
      const _seenColours = new Set();
      const availableColours = siblings.filter(s => s.name === currentProduct.name).filter(s => {
        if (_seenColours.has(s.colour)) return false;
        _seenColours.add(s.colour);
        return true;
      });
      const coloursHtml = availableColours.map(sib => {
        const activeClass = sib.sku === currentProduct.sku ? 'active' : '';
        let dotColor = sib.colour.toLowerCase()
          .replace('charcoal / grey','charcoal').replace('charcoal/grey','charcoal')
          .replace('royal blue','royal').replace('navy blue','navy')
          .replace('blue & white stripe','blue-stripe')
          .replace('white/stripe','white-stripe').replace('white / stripe','white-stripe')
          .replace('white/black','white').replace('white/blue','white')
          .split('/')[0].trim().replace(/\s+/g,'-');
        return `
          <span class="sw ${activeClass}" onclick="switchColor('${sib.sku}')" style="cursor:pointer;">
            <span class="dot ${dotColor}"></span>${sib.colour.replace('Blue & White Stripe','Blue Stripe').replace('White/Black','Black Border').replace('White/Blue','Blue Border').replace('White/Stripe','Stripe').split('/')[0].trim()}
          </span>
        `;
      }).join('');

      const typeSelectorHtml = uniqueTypes.length > 1 ? `
          <h4 style="font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy); margin-bottom: 12px;">1. Select Size / Type</h4>
          <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;">
            ${typesHtml}
          </div>
      ` : '';

      configBlockHtml = `
        <!-- Dynamic configurator for range -->
        <div style="margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--line);">
          ${typeSelectorHtml}
          <h4 style="font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy); margin-bottom: 12px;">${uniqueTypes.length > 1 ? '2. Select Colour' : 'Select Colour'}</h4>
          <div class="swatches" style="display:flex; flex-wrap:wrap; gap:8px;">
            ${coloursHtml}
            <span class="sw" onclick="window.location.href='contact.html?subject=colour-enquiry&sku=${currentProduct.sku}'" style="cursor:pointer;"><span class="dot more">+</span>More on request</span>
          </div>
        </div>
      `;
    } else {
      // Legacy simple siblings
      const siblings = window.ALT_HELPERS.getColorSiblings ? window.ALT_HELPERS.getColorSiblings(currentProduct) : [];
      if (siblings && siblings.length > 0) {
        const coloursHtml = siblings.map(sib => {
          const activeClass = sib.sku === currentProduct.sku ? 'active' : '';
          let dotColor = sib.colour.toLowerCase()
          .replace('charcoal / grey','charcoal').replace('charcoal/grey','charcoal')
          .replace('royal blue','royal').replace('navy blue','navy')
          .replace('blue & white stripe','blue-stripe')
          .replace('white/stripe','white-stripe').replace('white / stripe','white-stripe')
          .replace('white/black','white').replace('white/blue','white')
          .split('/')[0].trim().replace(/\s+/g,'-');
          return `
            <span class="sw ${activeClass}" onclick="window.location.href='product.html?sku=${sib.sku}'" style="cursor:pointer;">
              <span class="dot ${dotColor}"></span>${sib.colour.replace('Blue & White Stripe','Blue Stripe').replace('White/Black','Black Border').replace('White/Blue','Blue Border').replace('White/Stripe','Stripe').split('/')[0].trim()}
            </span>
          `;
        }).join('');

        configBlockHtml = `
          <div class="pd-colours">
            <h4>Available Colours</h4>
            <div class="swatches">
              ${coloursHtml}
              <span class="sw" onclick="window.location.href='contact.html?subject=colour-enquiry&sku=${currentProduct.sku}'" style="cursor:pointer;"><span class="dot more">+</span>More on request</span>
            </div>
            <div class="note">Other colours available through our supplier network for trade orders &mdash; <a href="contact.html?subject=colour-enquiry&sku=${currentProduct.sku}">enquire about colour options</a>.</div>
          </div>
        `;
      }
    }

    // Build the main product details container innerHTML
    document.getElementById('pdMain').innerHTML = `
      <div class="pd-gallery">
        <div class="main-img${isPh ? ' main-img-placeholder' : ''}">
          ${currentProduct.image ? `<img src="${currentProduct.image}" alt="${currentProduct.name}" id="mainImg" onerror="this.onerror=null;this.src='images/placeholder-product.svg'"/>` : ''}
          ${isPh ? '<div class="pd-photo-pending">Product photo on request — <a href="contact.html">contact us</a> for sample images</div>' : ''}
        </div>
      </div>

      <div class="pd-info">
        <div class="category">${cat ? cat.name : ''}${currentProduct.parentSku ? ' · ' + (window.ALT_PARENTS[currentProduct.parentSku]?.name || '') : ''}</div>
        <h1>${currentProduct.name.replace(/Classical|Deluxe/, m => `<em>${m}</em>`)}</h1>
        <div class="subtitle">${currentProduct.colour} · ${currentProduct.sku}</div>

        <div class="price-block">
          <div class="price" style="font-size:20px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--f-mono);">Request Quote</div>
          <div class="price-note">Trade pricing · Contact us for wholesale rates</div>
        </div>

        <!-- Configurator blocks -->
        ${configBlockHtml}

        <div class="spec-table">
          <div class="k">Size</div><div class="v">${currentProduct.size}</div>
          <div class="k">Weight</div><div class="v">${currentProduct.weight || 'Enquire with supplier'}</div>
          <div class="k">Material</div><div class="v">${currentProduct.material}</div>
          <div class="k">Colour</div><div class="v">${currentProduct.colour}</div>
          <div class="k">SKU</div><div class="v" style="font-family: var(--f-mono); font-size: 13px;">${currentProduct.sku}</div>
          <div class="k">Dispatch</div><div class="v">2–5 business days from Griffith NSW</div>
          <div class="k">Shipping</div><div class="v">Free Australia-wide over AU$100</div>
        </div>

        <div style="margin:18px 0 0;padding:14px 18px;background:var(--ivory,#faf8f3);border-left:3px solid var(--gold,#b8893a);font-size:13px;line-height:1.6;color:var(--muted,#5a5e78)">
          Questions about this product? Call <a href="tel:+61414533449" style="color:var(--navy,#1a3a6b);font-weight:600;text-decoration:none">0414 533 449</a>
        </div>

        <div class="pd-actions">
          <a href="contact.html" class="btn-primary" onclick="triggerQuoteRequest(false)">Request Quote</a>
          <a href="contact.html" class="btn-gold" onclick="triggerQuoteRequest(true)">Bulk Quote</a>
        </div>

        <div class="pd-features">
          <div class="pd-feat">
            <div class="ico"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 7h13v10H3zM16 10h4l2 3v4h-6"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div>
            <div><h5>Fast Shipping</h5><p>Free over AU$100 nationwide</p></div>
          </div>
          <div class="pd-feat">
            <div class="ico"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg></div>
            <div><h5>Commercial Grade</h5><p>Built for commercial laundering</p></div>
          </div>
          <div class="pd-feat">
            <div class="ico"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 19v-7h7"/></svg></div>
            <div><h5>Easy Returns</h5><p>14-day return policy</p></div>
          </div>
          <div class="pd-feat">
            <div class="ico"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
            <div><h5>Bulk Quote</h5><p>Custom pricing for volume</p></div>
          </div>
        </div>

        <div class="pd-description">
          <h4>Description</h4>
          <p>${currentProduct.description}</p>
        </div>
      </div>
    `;

    // Related products from same category
    const related = window.ALT_HELPERS.getProductsByCategory(currentProduct.categoryId).filter(p => p.sku !== currentProduct.sku).slice(0, 4);
    if (related.length > 0) {
      document.getElementById('relatedSection').style.display = 'block';
      document.getElementById('relatedGrid').innerHTML = related.map(p => {
        const img = p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.onerror=null;this.src='images/placeholder-product.svg'"/>` : '';
        return `
          <a href="product.html?sku=${p.sku}" class="r-card">
            <div class="img">${img}</div>
            <div class="body">
              <div class="title">${p.name}</div>
              <div class="price">${p.colour} · ${p.sku}</div>
            </div>
          </a>
        `;
      }).join('');
    } else {
      document.getElementById('relatedSection').style.display = 'none';
    }

    // Image Zoom functionality
    const imgContainer = document.querySelector('.main-img');
    const mainImgEl = document.getElementById('mainImg');
    if (imgContainer && mainImgEl && !isPh) {
      imgContainer.addEventListener('mousemove', function(e) {
        const rect = imgContainer.getBoundingClientRect();
        const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        const y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
        mainImgEl.style.transformOrigin = `${x}% ${y}%`;
      });
      imgContainer.addEventListener('mouseleave', function() {
        mainImgEl.style.transformOrigin = 'center center';
      });
    }

    // Expose global dynamic handlers
    window.switchType = function(typeName) {
      const siblings = window.ALT_PRODUCTS.filter(s => s.parentSku === currentProduct.parentSku);
      const typeSiblings = siblings.filter(s => s.name === typeName);
      if (typeSiblings.length === 0) return;
      
      const sameColorProduct = typeSiblings.find(s => s.colour.split('/')[0].trim() === currentProduct.colour.split('/')[0].trim());
      const nextProduct = sameColorProduct || typeSiblings[0];
      
      renderProductPage(nextProduct.sku);
    };

    window.switchColor = function(newSku) {
      renderProductPage(newSku);
      const p2 = window.ALT_PRODUCTS && window.ALT_PRODUCTS.find(p => p.sku === newSku);
      if (p2 && window.ALT_SAVE_RECENT) window.ALT_SAVE_RECENT(p2);
    };

    window.triggerQuoteRequest = function(isBulk) {
      const typeLabel = isBulk ? "bulk/wholesale order" : "wholesale quote";
      const msg = `Hi,\n\nI would like to request a ${typeLabel} for the following product:\n\nProduct: ${currentProduct.name}\nColour: ${currentProduct.colour}\nSize: ${currentProduct.size}${currentProduct.weight ? '\nWeight: '+currentProduct.weight : ''}\nSKU: ${currentProduct.sku}\n\nCould you please provide pricing and availability?\n\nThank you.`;
      sessionStorage.setItem('alt_enquiry', msg);
    };
  }

  document.addEventListener('DOMContentLoaded', () => {
    const initialSku = new URLSearchParams(window.location.search).get('sku');
    renderProductPage(initialSku);
    // Track recently viewed (used by upgrades.js banner on home/collection)
    const prod = initialSku && window.ALT_PRODUCTS && window.ALT_PRODUCTS.find(p => p.sku === initialSku);
    if (prod && window.ALT_SAVE_RECENT) window.ALT_SAVE_RECENT(prod);
  });

  window.addEventListener('popstate', (event) => {
    const stateSku = event.state && event.state.sku;
    const currentSku = stateSku || new URLSearchParams(window.location.search).get('sku');
    renderProductPage(currentSku);
  });
</script>
<script src="assets/chat-widget.js" defer></script>
</body>
</html>
